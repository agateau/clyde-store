name: sqlite
description: SQLite is a C-language library that implements a small, fast, self-contained, high-reliability, full-featured, SQL database engine.
homepage: https://www.sqlite.org
repository: https://github.com/CompuRoot/static-sqlite3
comment: |
  3.37.0 did not use the official binaries because sqlite does not provide x86_64 binaries
releases:
  3.37.0:
    x86_64-linux:
      url: https://github.com/CompuRoot/static-sqlite3/releases/download/3.37.0/sqlite3
      sha256: cf040cd539f017b4eb5de26eb626247c92ba2a56086252a1cfd1efb14c0f79f9
  3.53.0:
    aarch64-macos:
      url: https://sqlite.org/2026/sqlite-tools-osx-arm64-3530000.zip
      sha256: 4fd16681af51b7dd002053a269ce00c95a7dbe76cc7832ffc3505f8228d020bc
    x86_64-linux:
      url: https://sqlite.org/2026/sqlite-tools-linux-x64-3530000.zip
      sha256: a5f5a164bab3418a6469cc0dff030c1ddc2d05ab795e1b0adc435a089129d401
    x86_64-macos:
      url: https://sqlite.org/2026/sqlite-tools-osx-x64-3530000.zip
      sha256: a8b85155e77af26a2eab6228a7c897113f5dccb3e94e070c6ff0e07f520074e7
    x86_64-windows:
      url: https://sqlite.org/2026/sqlite-tools-win-x64-3530000.zip
      sha256: 8ccef1d86a312f4affaa313e0d355b4e8bd7cadcd02d79c9f539cfca50e73ff8
installs:
  3.37.0:
    any-any:
      files:
        sqlite3: bin/
      tests:
      - sqlite --version
  3.53.0:
    any-any:
      files:
        sqlite3${exe_ext}: bin/
        sqldiff${exe_ext}: bin/
        sqlite3_analyzer${exe_ext}: bin/
        sqlite3_rsync${exe_ext}: bin/
      tests:
      - sqlite3${exe_ext} --version
      - sqldiff${exe_ext} --help
      - sqlite3_analyzer${exe_ext} --version
      - sqlite3_rsync${exe_ext} --version
fetcher: Script
